        // ── Level 1 (2.1) ── Why Local? Decision Framework ─────────────────────
        {
          title: "Why Local? Decision Framework",
          subtitle: "When does self-hosting actually beat the cloud?",
          context:
            "At 10K requests/day, a self-hosted RTX 4090 ($1,500) pays for itself in ~2 months vs GPT-4o-mini API at $0.15/1M input tokens. Privacy (GDPR/HIPAA), sub-10ms latency, and air-gapped deployment are the other three drivers that APIs simply can't match.",
          gameType: "CostOptimizer",
          gameConfig: {
            scenario:
              "You're deciding whether to self-host Llama 3.1 8B or keep using a cloud API. Adjust the sliders to find the configuration where local hosting becomes cheaper than cloud.",

              {
                name: "Requests per Day",
                min: 100,
                max: 50000,
                step: 100,
                default: 5000,
                unit: "",
                costImpact(v) {
                  // Monthly cloud API cost: assume avg 500 tokens/request at $0.15/1M input tokens
                  const monthlyTokens = v * 30 * 500;
                  return (monthlyTokens / 1_000_000) * 0.15;
                },
              },
              {
                name: "GPU Depreciation ($/mo)",
                min: 50,
                max: 200,
                step: 10,
                default: 83,
                unit: "/mo",
                costImpact(v) {
                  // This is a fixed cost subtracted from cloud savings — represented as negative
                  return -v;
                },
              },
              {
                name: "Electricity ($/mo)",
                min: 30,
                max: 100,
                step: 5,
                default: 50,
                unit: "/mo",
                costImpact(v) {
                  return -v;
                },
              },
            ],
            // budget = net savings must be positive (local cheaper than cloud)
            // CostOptimizer checks if total <= budget; here total = cloud_cost - fixed_costs
            // We want total > 0, meaning cloud cost exceeds fixed costs.
            // We'll invert: budget represents "maximum acceptable net cost".
            // Net = cloudCost - gpu_depreciation - electricity
            // If net > 0: cloud is more expensive → local wins.
            // Pass condition: total (cloud cost - fixed overhead) under budget of 0 from above
            // Rethinking: CostOptimizer computes sum of costImpact values and checks <= budget
            // cloud cost is positive, fixed costs are negative → total = net cloud savings
            // Set budget to 0: pass when net savings > 0 (cloud costs more than local)
            budget: 0,
          },
          keyInsight:
            "Local wins at >5K requests/day for most open-weight models. But factor in: GPU depreciation (~$83/mo for RTX 4090 over 18 months), electricity (~$50/mo at full load), maintenance time, and operator expertise. The true break-even for a team is typically 3–8K requests/day depending on average prompt length.",
        },

        // ── Level 2 (2.2) ── Quantization Formats (GGUF Deep Dive) ────────────
        {
          title: "Quantization Formats — GGUF Deep Dive",
          subtitle: "Q4_K_M vs Q8_0 vs FP16 — find the production sweet spot",
          context:
            "GGUF Q4_K_M loses only ~0.15 perplexity points vs FP16 while using 4× less memory. Q2_K loses ~1.2 perplexity — usually unacceptable. Q8_0 is near-lossless at 0.02 perplexity loss. The 'K' suffix means K-means clustering improves weight distribution within each quantization block.",
          gameType: "ParameterTuner",
          gameConfig: {
            description:
              "Tune the quantization level for a Llama 3.1 7B model on a 24GB GPU. Find the configuration that maximizes speed while staying within VRAM limits and keeping quality acceptable.",
            sliders: [
              {
                name: "Quant Bits",
                min: 2,
                max: 16,
                step: 1,
                default: 4,
                unit: "-bit",
                labels: {
                  2: "Q2_K",
                  3: "Q3_K_M",
                  4: "Q4_K_M",
                  5: "Q5_K_M",
                  6: "Q6_K",
                  8: "Q8_0",
                  16: "FP16",
                },
              },
              {
                name: "Context Length (K)",
                min: 2,
                max: 128,
                step: 2,
                default: 8,
                unit: "K tokens",
              },
            ],
            gauges: [
              {
                name: "Perplexity Loss",
                unit: " pts",
                decimals: 2,
                good: [0, 0.5],
                compute(v) {
                  // Empirical values: FP16=0, Q8=0.02, Q6=0.05, Q5=0.10, Q4=0.15, Q3=0.40, Q2=1.20
                  const bits = v["Quant Bits"];
                  const lossMap = {
                    2: 1.2,
                    3: 0.4,
                    4: 0.15,
                    5: 0.1,
                    6: 0.05,
                    7: 0.03,
                    8: 0.02,
                  };
                  return bits >= 9 ? 0.0 : lossMap[bits] || 0.15;
                },
              },
              {
                name: "Tokens / sec",
                unit: " t/s",
                decimals: 0,
                good: [25, 9999],
                compute(v) {
                  // Lower bits → more layers fit in GPU SRAM → faster. ~90 t/s at Q4, ~55 at FP16
                  const bits = v["Quant Bits"];
                  const speedMap = {
                    2: 130,
                    3: 115,
                    4: 90,
                    5: 78,
                    6: 68,
                    7: 60,
                    8: 55,
                  };
                  return bits >= 9 ? 35 : speedMap[bits] || 90;
                },
              },
              {
                name: "VRAM (GB)",
                unit: " GB",
                decimals: 1,
                good: [0, 23],
                compute(v) {
                  // 7B model weights + KV cache
                  // weights: 7B × bits / 8 bytes = GB. Q4 ≈ 3.5GB model + context
                  const bits = v["Quant Bits"];
                  const ctx = v["Context Length (K)"];
                  const modelGB = (7_000_000_000 * bits) / 8 / 1e9;
                  // KV cache: 2 × layers × heads × head_dim × ctx × 2 bytes (FP16) ≈ 0.5 MB/K token for 7B
                  const kvGB = (ctx * 0.5) / 1024;
                  return modelGB + kvGB;
                },
              },
            ],

                min: 0,

                  const base = 250 - gpuFraction * 200;
                  return Math.max(20, Math.round(base + ctxPenalty));

                name: "Tokens / sec",
                unit: " t/s",
                decimals: 0,
                good: [30, 9999],
                compute(v) {

                  const gpuFraction = v["GPU Layers"] / 33;
                  const batchBonus = Math.min(
                    1.5,
                    1 + (v["Batch Size"] - 1) * 0.02,
                  );
                  const base = 10 + gpuFraction * 80;
                  return Math.round(base * batchBonus);

                  return +(layerVRAM + kvVRAM + overhead).toFixed(1);
