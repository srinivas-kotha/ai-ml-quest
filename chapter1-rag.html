Large Language Models are powerful, but they have a fundamental flaw: **hallucination**. They generate plausible-sounding answers that are factually wrong because their knowledge is frozen at training time. If your company's product documentation changed last week, the LLM has no way to know.

RAG solves this by adding a retrieval step before generation. Instead of relying solely on the model's memory, RAG **fetches relevant documents** from an external knowledge base and feeds them to the LLM as context. The model then generates answers grounded in real, up-to-date data — with citations pointing back to the source.

The key insight: RAG separates **what the model knows** (general language ability) from **what it can access** (your specific documents). You update the knowledge base, not the model. This means updates happen in minutes, not days of retraining.

**HNSW (Hierarchical Navigable Small World)** graphs solve this. Think of it like "six degrees of separation" for vectors: the algorithm builds layers of connections between vectors, where higher layers connect distant neighbors and lower layers connect close neighbors. Query time is O(log n) with >99% recall.
