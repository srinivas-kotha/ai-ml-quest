WITH vector_results AS (
  SELECT id, content, embedding <-> $1 AS distance
  FROM documents
  WHERE embedding <-> $1 < 0.5
  ORDER BY distance LIMIT 20
),
text_results AS (
  SELECT id, content, ts_rank(tsv, query) AS rank
  FROM documents, plainto_tsquery($2) query
  WHERE tsv @@ query
  ORDER BY rank LIMIT 20
)
SELECT id, content,
  COALESCE(1.0/(60+v.rn), 0) + COALESCE(1.0/(60+t.rn), 0) AS rrf_score
FROM (SELECT *, ROW_NUMBER() OVER (ORDER BY distance) rn FROM vector_results) v
FULL JOIN (SELECT *, ROW_NUMBER() OVER (ORDER BY rank) rn FROM text_results) t USING (id)
ORDER BY rrf_score`,

        {
          title: "Production Cost & Latency",
          subtitle: "Cut the naive $2.50/request pipeline to under $0.30",
          context:
            "A naive RAG pipeline costs $2.50/request: embedding ($0.30) + vector search ($0.10) + re-ranker ($0.40) + GPT-4o generation ($1.80). With semantic caching, batch embeddings, and model routing, production teams routinely achieve 90%+ cost reduction. The order of optimizations matters — highest-impact first. Target: under $0.30 per request.",
          gameType: "CostOptimizer",
          gameConfig: {
            scenario:
              "Naive pipeline cost: $2.50/request. Apply semantic caching, batch embedding discounts, and model routing to hit under $0.30. Each slider independently reduces cost.",
            budget: 0.3,
            sliders: [
              {
                name: "Semantic Cache Hit Rate",
                min: 0,
                max: 70,
                step: 5,
                default: 0,
                unit: "%",
                costImpact: (v) => {
