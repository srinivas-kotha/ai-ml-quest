      document.addEventListener("DOMContentLoaded", () => {
        // ----------------------------------------------------------------

        const levels = [
          // ── L4.1 ── When to Fine-Tune (Decision Framework) ──────────
          {
            title: "When to Fine-Tune",
            subtitle: "RAG vs Fine-Tune vs Hybrid — Decision Framework",
            context:
              "<5% of production AI uses full fine-tuning. LoRA/QLoRA is the standard for 95% of cases. Knowing WHEN to fine-tune separates AI engineers from prompt engineers.",
            gameType: "SpeedQuiz",
            gameConfig: {
              timePerQuestion: 30,
              questions: [
                {
                  question:
                    "A payment API must always return valid JSON with specific fields. The model sometimes returns prose. Best approach?",
                  options: [
                    "RAG — add JSON examples to retrieved docs",
                    "Fine-tune — teach the model the exact output format",
                    "Prompt engineering only",
                    "Use a larger base model",
                  ],
                  correct: 1,
                  explanation:
                    "Fine-tune for FORMAT. JSON output, classification labels, and structured extraction are ideal fine-tuning targets. The model learns the schema as a behavior, not a fact.",
                },
                {
                  question:
                    "A support bot needs to answer questions about products that change weekly with new SKUs and specs. Best approach?",
                  options: [
                    "Fine-tune monthly on new product data",
                    "RAG — index the product catalog, query at runtime",
                    "Both fine-tune and RAG every week",
                    "Hard-code product data in system prompt",
                  ],
                  correct: 1,
                  explanation:
                    "RAG for KNOWLEDGE. Facts that change frequently should live in a retrieval index, not baked into model weights. Fine-tuning on changing facts causes staleness.",
                },
                {
                  question:
                    "A legal firm needs their AI to write in their house style: formal, passive voice, UK English, specific citation formats. Best approach?",
                  options: [
                    "RAG over style guide documents",
                    "Fine-tune on ~500 examples of approved legal documents",
                    "Few-shot prompting with 10 style examples",
                    "Use a larger frontier model",
                  ],
                  correct: 1,
                  explanation:
                    "Fine-tune for WRITING STYLE. Consistent tone, voice, and formatting patterns are learned behaviors — fine-tuning on real examples outperforms RAG or prompting for style consistency.",
                },
                {
                  question:
                    "A research assistant must cite sources and show which documents support each claim. Best approach?",
                  options: [
                    "Fine-tune to always add citations",
                    "RAG — retrieval provides the source documents and citations naturally",
                    "Fine-tune on papers with citation format",
                    "Both RAG and fine-tune",
                  ],
                  correct: 1,
                  explanation:
                    "RAG for CITATIONS. You can't fine-tune in real citations — the model would hallucinate them. RAG grounds responses in actual retrieved documents and tracks provenance.",
                },
                {
                  question:
                    "A bank needs to classify incoming messages into 23 internal categories with 99%+ accuracy at <50ms latency. Best approach?",
                  options: [
                    "RAG over category descriptions",
                    "Fine-tune a small model (BERT/DistilBERT) for classification",
                    "Use GPT-4 with the full category list in prompt",
                    "Chain-of-thought prompting",
                  ],
                  correct: 1,
                  explanation:
                    "Fine-tune for LOW-LATENCY CLASSIFICATION. A fine-tuned small classifier (BERT-class) runs in <10ms and achieves 99%+ on narrow tasks. GPT-4 at 2-5s latency and high cost is overkill.",
                },
                {
                  question:
                    "An analyst needs to answer complex multi-hop questions: 'Which companies in our portfolio overlap with Apple's suppliers that also had earnings misses last quarter?' Best approach?",
                  options: [
                    "Fine-tune on multi-hop reasoning examples",
                    "RAG + agentic tool use — break into sub-queries across multiple indexes",
                    "Prompt with chain-of-thought",
                    "Fine-tune + RAG hybrid",
                  ],
                  correct: 1,
                  explanation:
                    "RAG + Agent for MULTI-HOP. This requires querying multiple data sources and combining results — not a format issue, but a knowledge retrieval + reasoning orchestration problem.",
                },
                {
                  question:
                    "An insurance company needs to extract 15 specific fields from handwritten legacy claim forms (after OCR). Fields have irregular formatting. Best approach?",
                  options: [
                    "RAG over form templates",
                    "Fine-tune on labeled (form, extracted JSON) pairs",
                    "Few-shot prompting with 5 examples",
                    "Use a vision model without fine-tuning",
                  ],
                  correct: 1,
                  explanation:
                    "Fine-tune for STRUCTURED EXTRACTION from irregular formats. The model learns domain-specific field semantics and handles OCR noise. Labeled pairs from your actual forms are the training data.",
                },
                {
                  question:
                    "A news platform wants to answer questions like 'What happened in the Gaza ceasefire talks today?' Best approach?",
                  options: [
                    "Fine-tune weekly on news articles",
                    "RAG over a live-updated news index",
                    "Use a model with internet access",
                    "RAG with daily ingestion pipeline",
                  ],
                  correct: 3,
                  explanation:
                    "RAG with live ingestion for CURRENT EVENTS. Fine-tuning has a training cutoff and can't adapt to today's news. A daily ingestion pipeline ensures the retrieval index is current.",
                },
              ],
            },
            keyInsight:
              "Fine-tune for FORMAT (JSON output, writing style, classification, structured extraction). RAG for KNOWLEDGE (facts, documents, citations, live data). The decision is about what changes: if the task structure changes → fine-tune; if the facts change → RAG.",
          },

          // ── L4.2 ── SFT Fundamentals ────────────────────────────────
          {
            title: "SFT Fundamentals",
            subtitle: "Supervised Fine-Tuning — Hyperparameters That Matter",
            context:
              "Flash Attention 2 delivers 3-10x faster attention computation. Learning rate is the single most critical SFT hyperparameter — too high causes catastrophic forgetting, too low means no adaptation.",
            gameType: "ParameterTuner",
            gameConfig: {
              description:
                "Configure SFT hyperparameters to minimize training loss without overfitting. All three gauges must be in the green zone.",
              sliders: [
                {
                  name: "learning_rate",
                  min: 0.00001,
                  max: 0.001,
                  step: 0.00001,
                  default: 0.0002,
                  unit: "",
                },
                {
                  name: "warmup_steps",
                  min: 0,
                  max: 500,
                  step: 10,
                  default: 100,
                  unit: "",
                },
                {
                  name: "epochs",
                  min: 1,
                  max: 10,
                  step: 1,
                  default: 5,
                  unit: "",
                },
                {
                  name: "batch_size",
                  min: 1,
                  max: 32,
                  step: 1,
                  default: 16,
                  unit: "",
                },
              ],
              gauges: [
                {
                  name: "Training Loss",
                  unit: "",
                  decimals: 2,
                  good: [0.5, 1.5],
                  compute: (v) => {
                    // Lower LR = higher training loss; reasonable range 0.3-2.5
                    const lrFactor = (0.001 - v.learning_rate) / 0.001;
                    const epochFactor = v.epochs / 10;
                    return (
                      Math.max(
                        0.2,
                        2.5 - epochFactor * 1.8 - (1 - lrFactor) * 0.5,
                      ).toFixed(2) * 1
                    );
                  },
                },
                {
                  name: "Validation Loss",
                  unit: "",
                  decimals: 2,
                  good: [0.5, 2.0],
                  compute: (v) => {
                    // Validation loss diverges when lr is high AND epochs are high
                    const overfit = (v.learning_rate / 0.001) * (v.epochs / 10);
                    const base = 0.9;
                    return Math.max(0.3, base + overfit * 2.5).toFixed(2) * 1;
                  },
                },
                {
                  name: "Overfit Risk",
                  unit: "%",
                  decimals: 0,
                  good: [0, 30],
                  compute: (v) => {
                    // epochs * lr correlation; warmup helps
                    const raw =
                      v.epochs * (v.learning_rate / 0.0002) * 10 -
                      (v.warmup_steps / 500) * 15;
                    return Math.max(0, Math.min(100, Math.round(raw)));
                  },
                },
              ],
            },
            keyInsight:
              "Start with lr=2e-5, warmup=10% of total steps, 3 epochs. Watch validation loss — when it diverges from training loss, you're overfitting. Flash Attention 2 has zero quality impact; enable it unconditionally for 3-10x speed improvement.",
          },

          // ── L4.3 ── LoRA Deep Dive ───────────────────────────────────
          {
            title: "LoRA Deep Dive",
            subtitle: "The Math Behind Low-Rank Adaptation",
            context:
              "W = W₀ + BA. B is (d×r), A is (r×k). With r=16, you train 0.1% of parameters while preserving 95%+ of full fine-tuning quality. The rank r controls the expressivity-efficiency tradeoff.",
            gameType: "ParameterTuner",
            gameConfig: {
              description:
                "Tune LoRA hyperparameters for a 7B model. Hit all three green zones: low trainable parameter footprint, VRAM that fits a 24GB GPU, and quality close to full fine-tuning.",
              sliders: [
                {
                  name: "rank_r",
                  min: 4,
                  max: 128,
                  step: 4,
                  default: 64,
                  unit: "",
                },
                {
                  name: "alpha",
                  min: 4,
                  max: 256,
                  step: 4,
                  default: 128,
                  unit: "",
                },
                {
                  name: "target_modules",
                  min: 2,
                  max: 7,
                  step: 1,
                  default: 5,
                  unit: " modules",
                },
              ],
              gauges: [
                {
                  name: "Trainable Params %",
                  unit: "%",
                  decimals: 3,
                  good: [0.05, 1.0],
                  compute: (v) => {
                    // 7B model: ~7000M params. LoRA params = 2 * r * d * num_layers * target_modules
                    // Rough estimate: each module adds ~2 * r * 4096 * 32 params
                    const loraParams =
                      2 * v.rank_r * 4096 * 32 * v.target_modules;
                    return (loraParams / 7e9) * 100;
                  },
                },
                {
                  name: "VRAM (GB)",
                  unit: "",
                  decimals: 1,
                  good: [4, 23],
                  compute: (v) => {
                    // 7B in 4-bit (QLoRA): ~4GB base + LoRA activations
                    const baseVram = 4.0;
                    const loraVram = (v.rank_r / 16) * v.target_modules * 0.15;
                    const activationVram = 1.5;
                    return baseVram + loraVram + activationVram;
                  },
                },
                {
                  name: "Quality vs Full FT %",
                  unit: "",
                  decimals: 1,
                  good: [90, 100],
                  compute: (v) => {
                    // Diminishing returns: r=4→80%, r=16→92%, r=64→96%, r=128→97%
                    const rankQuality = 100 - 20 / Math.log2(v.rank_r + 1);
                    // Alpha scaling: alpha/r ratio ~2 is optimal; far from 2 hurts slightly
                    const alphaRatio = v.alpha / v.rank_r;
                    const alphaPenalty =
                      alphaRatio < 0.5 || alphaRatio > 8 ? 3 : 0;
                    // More target modules = better quality
                    const moduleBonus = (v.target_modules - 2) * 0.5;
                    return Math.min(
                      100,
                      Math.max(70, rankQuality + moduleBonus - alphaPenalty),
                    );
                  },
                },
              ],
            },
            keyInsight:
              "r=16, alpha=32 (scaling factor=2x) is the universal LoRA starting point. Target all linear layers (not just attention) for a 5-10% quality boost at 2x parameter cost. Beyond r=64, quality gains are marginal — you're wasting VRAM.",
          },

          // ── L4.4 ── QLoRA ────────────────────────────────────────────
          {
            title: "QLoRA Cost Optimizer",
            subtitle: "4-bit Quantized LoRA — Democratizing Fine-Tuning",
            context:
              "7B full fine-tuning = 112GB VRAM → QLoRA = 5GB. 70B full fine-tuning = 560GB VRAM → QLoRA = 46GB. NF4 (NormalFloat4) quantization is information-theoretically optimal for normally distributed neural network weights.",
            gameType: "CostOptimizer",
            gameConfig: {
              scenario:
                "Fine-tune a 7B model under $10 budget using QLoRA. Sliders: GPU hourly rate (RTX 4090=$0.40/hr, A100-40GB=$1.50/hr, A100-80GB=$2.50/hr), training hours, and model size overhead. Total cost = GPU $/hr × hours + size overhead. Hit under budget to pass.",
              budget: 10,
              sliders: [
                {
                  // GPU rate slider — its value IS the $/hr directly fed to costImpact
                  name: "GPU $/hr (0.40=RTX4090, 1.50=A100-40, 2.50=A100-80)",
                  min: 0.4,
                  max: 2.5,
                  step: 0.1,
                  default: 1.5,
                  unit: " $/hr",
                  // costImpact(v): v = GPU rate; multiply by fixed 5h = base cost
                  costImpact: (v) => v * 5,
                },
                {
                  // Extra hours beyond base 5 — adds cost at current rate
                  name: "Extra Training Hours (beyond base 5h)",
                  min: 0,
                  max: 5,
                  step: 0.5,
                  default: 2,
                  unit: "h",
                  // At default GPU rate $1.50, each extra hour = $1.50
                  // We use a fixed $1.00/hr equivalent here as additive overhead
                  costImpact: (v) => v * 1.0,
                },
                {
                  // Model size — larger models need bigger disks/more download costs
                  name: "Model Size (7=7B, 13=13B, 34=34B, 70=70B)",
                  min: 7,
                  max: 70,
                  step: 7,
                  default: 7,
                  unit: "B",
                  // Storage + download overhead: ~$0.05 per billion params
                  costImpact: (v) => v * 0.05,
                },
              ],
            },
            keyInsight:
              "7B QLoRA on RTX 4090 (~$0.40/hr on Vast.ai) = ~$1.20 for 3 hours on 1K samples. QLoRA matches full LoRA quality with negligible degradation from the 4-bit NF4 base model. NF4 beats standard INT4 because it places quantization bins at equal-area intervals matching the normal distribution of LLM weights.",
          },

          // ── L4.5 ── LoRA Variants ────────────────────────────────────
          {
            title: "LoRA Variants",
            subtitle: "DoRA, rsLoRA, LoRA+, TIES Merge, DARE Merge",
            context:
              "DoRA (Weight-Decomposed LoRA, ICLR 2025) decomposes weight updates into magnitude and direction components, delivering +22% improvement at low ranks with zero inference overhead — it merges back into the base model identically.",
            gameType: "ConceptMatcher",
            gameConfig: {
              pairs: [
                {
                  left: "DoRA",
                  right:
                    "Weight-decomposed adaptation — separates magnitude & direction, +22% at r=4",
                },
                {
                  left: "rsLoRA",
                  right:
                    "Rank-stabilized scaling — prevents gradient vanishing at high ranks (r≥64)",
                },
                {
                  left: "LoRA+",
                  right:
                    "Asymmetric learning rates — higher LR for matrix B than matrix A",
                },
                {
                  left: "TIES Merge",
                  right:
                    "Resolves sign conflicts when combining multiple LoRA adapters into one",
                },
                {
                  left: "DARE Merge",
                  right:
                    "Randomly drops (zeros out) adapter weights before merging to reduce interference",
                },
                {
                  left: "Task Arithmetic",
                  right:
                    "Add or subtract adapter weight vectors to compose or negate task-specific behaviors",
                },
              ],
            },
            keyInsight:
              "Try LoRA+ first — it's just a hyperparameter change (set B's LR 4-16x higher than A's). Then DoRA for low-rank scenarios (r≤8). rsLoRA only matters at r≥64. Use TIES merge when combining task-specific adapters to avoid sign conflicts.",
          },

          // ── L4.6 ── DPO ─────────────────────────────────────────────
          {
            title: "DPO Pipeline",
            subtitle: "Direct Preference Optimization — No Reward Model Needed",
            context:
              "DPO eliminates the separate reward model AND the PPO optimizer entirely by using a mathematically equivalent closed-form loss. Quality of CHOSEN responses is the primary driver — focus annotation budget there, not on chosen/rejected balance.",
            gameType: "PipelineBuilder",
            gameConfig: {
              description:
                "Build the correct DPO alignment pipeline. Select components in the right order. Note: DPO skips several RLHF components entirely.",
              components: [
                { id: "sft_model", label: "SFT Model (base)" },
                { id: "generate_completions", label: "Generate Completions" },
                { id: "human_scoring", label: "Human Scoring" },
                { id: "pair_chosen_rejected", label: "Pair Chosen/Rejected" },
                { id: "dpo_trainer", label: "DPO Trainer" },
                { id: "reward_model", label: "Reward Model (RM)" },
                { id: "ppo_optimizer", label: "PPO Optimizer" },
                { id: "merged_model", label: "Merged/Deployed Model" },
              ],
              correctOrder: [
                "sft_model",
                "generate_completions",
                "human_scoring",
                "pair_chosen_rejected",
                "dpo_trainer",
                "merged_model",
              ],
            },
            keyInsight:
              "DPO skips Reward Model and PPO entirely. Even 2K high-quality chosen/rejected pairs can produce 5% benchmark improvement. Focus annotation budget on CHOSEN response quality — a mediocre chosen example is worse than no example.",
          },

          // ── L4.7 ── RLHF vs DPO vs ORPO vs SimPO ───────────────────
          {
            title: "Alignment Method Selector",
            subtitle: "RLHF, DPO, ORPO, SimPO, GRPO — When to Use Which",
            context:
              "The 2026 production alignment stack: SFT → DPO or SimPO (alignment) → GRPO or RLVR (reasoning). This exact sequence is used by every frontier lab including Llama 3, Qwen 2.5, and DeepSeek.",
            gameType: "SpeedQuiz",
            gameConfig: {
              timePerQuestion: 35,
              questions: [
                {
                  question:
                    "You have only thumbs-up/thumbs-down feedback — no chosen/rejected pairs. Which alignment method?",
                  options: [
                    "DPO — requires only binary labels",
                    "KTO — Kahneman-Tversky Optimization, works with unpaired binary feedback",
                    "RLHF — can use binary rewards",
                    "SimPO — reference-free, no pairs needed",
                  ],
                  correct: 1,
                  explanation:
                    "KTO (Kahneman-Tversky Optimization) is designed for unpaired binary feedback. DPO and SimPO require paired (chosen, rejected) examples. KTO trains directly on desirable/undesirable signal without pairing.",
                },
                {
                  question:
                    "You want alignment in a single training stage — no separate SFT then DPO. Maximum efficiency. Which method?",
                  options: [
                    "DPO — faster than RLHF",
                    "RLHF — full pipeline",
                    "ORPO (Odds Ratio Preference Optimization) — single-stage SFT+alignment",
                    "SimPO — no reference model",
                  ],
                  correct: 2,
                  explanation:
                    "ORPO combines supervised fine-tuning and preference optimization into a single stage by adding an odds ratio penalty to the SFT loss. No separate SFT → alignment pipeline needed.",
                },
                {
                  question:
                    "Your team needs the highest possible AlpacaEval scores and has compute to spare, but wants to avoid maintaining a reference model. Which method?",
                  options: [
                    "DPO — industry standard",
                    "RLHF — highest quality ceiling",
                    "SimPO (+6.4 AlpacaEval vs DPO) — no reference model, margin-based",
                    "GRPO — group relative optimization",
                  ],
                  correct: 2,
                  explanation:
                    "SimPO (Simple Preference Optimization) removes the reference model entirely and uses a target reward margin, achieving +6.4 AlpacaEval improvement over DPO as of 2024 benchmarks.",
                },
                {
                  question:
                    "You want to improve multi-step mathematical reasoning and code generation. The model needs to learn to think, not just to prefer. Which method?",
                  options: [
                    "DPO — preference optimization",
                    "SimPO — quality optimization",
                    "GRPO (Group Relative Policy Optimization) — reasoning-specific",
                    "ORPO — efficient single stage",
                  ],
                  correct: 2,
                  explanation:
                    "GRPO is used by DeepSeek-R1 and Qwen-Math specifically for reasoning. It computes relative advantages within a group of sampled completions, enabling the model to learn step-by-step reasoning without a reward model.",
                },
                {
                  question:
                    "Your organization has dedicated RL researchers, PPO expertise, and needs maximum control over the reward signal with human feedback loops. Which method?",
                  options: [
                    "DPO — simpler and competitive",
                    "RLHF with reward model + PPO — full control, highest complexity",
                    "SimPO — no reward model overhead",
                    "GRPO — group relative",
                  ],
                  correct: 1,
                  explanation:
                    "RLHF with a learned reward model + PPO gives the most control but requires RL expertise, careful reward hacking mitigation, and significant infrastructure. Only justified with dedicated teams.",
                },
                {
                  question:
                    "You want the simplest possible first alignment step for a new product. Baseline quality, fast iteration. Which method?",
                  options: [
                    "RLHF — proven and comprehensive",
                    "DPO — simple, no RL, pairs→loss, 2-3 days to implement",
                    "GRPO — state of the art",
                    "KTO — needs no pairs",
                  ],
                  correct: 1,
                  explanation:
                    "DPO is the practical starting point: no RL infrastructure, no reward model, just paired examples and a cross-entropy-like loss. Most teams start here before considering SimPO or GRPO.",
                },
                {
                  question:
                    "Which method uses GROUP of sampled outputs to estimate relative advantage without a reward model?",
                  options: [
                    "DPO — uses reference model log-probs",
                    "PPO — uses value function baseline",
                    "GRPO (Group Relative Policy Optimization)",
                    "ORPO — uses odds ratio",
                  ],
                  correct: 2,
                  explanation:
                    "GRPO samples multiple completions per prompt, computes rewards (or rule-based scores) for each, and uses the group's mean reward as the baseline. No critic/value network needed — the group itself is the reference.",
                },
                {
                  question:
                    "DAPO (Direct Alignment from Preference Optimization) was introduced by which organization and improves upon what method?",
                  options: [
                    "OpenAI, improves PPO stability",
                    "ByteDance, improves GRPO for large-scale reasoning training",
                    "Google DeepMind, improves DPO with contrastive loss",
                    "Meta, improves RLHF data efficiency",
                  ],
                  correct: 1,
                  explanation:
                    "DAPO was introduced by ByteDance/Tiktok Research in 2025, improving upon GRPO by adding clip-higher trick, dynamic sampling, and token-level policy gradient for more stable large-scale reasoning training.",
                },
              ],
            },
            keyInsight:
              "DPO for simplicity and fast iteration. SimPO for highest benchmark quality. GRPO for reasoning enhancement (math, code, chain-of-thought). ORPO for single-stage efficiency. RLHF is legacy for teams without dedicated RL researchers.",
          },

          // ── L4.8 ── Dataset Curation ─────────────────────────────────
          {
            title: "Dataset Curation Pipeline",
            subtitle: "The Secret Weapon — Quality over Quantity",
            context:
              "Magpie (ICLR 2025): by prompting Llama 3 with only a user-turn token, the model auto-generates instruction-response pairs. 300K Magpie-filtered examples match the quality of 10M human-curated samples. Data quality beats data quantity every time.",
            gameType: "PipelineBuilder",
            gameConfig: {
              description:
                "Build a production dataset curation pipeline. Order the stages correctly to go from raw 100K examples to a high-quality training set.",
              components: [
                { id: "raw_data_100k", label: "Raw Data (100K examples)" },
                { id: "perplexity_filter", label: "Perplexity Filter" },
                { id: "minhash_dedup", label: "MinHash Deduplication" },
                {
                  id: "contamination_check",
                  label: "Benchmark Contamination Check",
                },
                {
                  id: "quality_scorer",
                  label: "Quality Scorer (LLM-as-judge)",
                },
                { id: "length_filter", label: "Length Filter" },
