          subtitle: "Statistical Methods — KS, PSI, and Wasserstein",
          context:
            "KS test detects 0.5% drift at 100K observations — dangerously oversensitive in production! PSI misses subtle but real drift on small windows. Wasserstein distance is the production compromise: stable across sample sizes, measures actual magnitude of shift.",
          gameType: "ParameterTuner",
          gameConfig: {
            description:

              {
                name: "Sample Size",
                min: 1000,
                max: 500000,
                step: 1000,
                default: 10000,
                unit: "",
              },
              {
                name: "True Drift Magnitude %",
                min: 0,
                max: 20,
                step: 0.5,
                default: 5,
                unit: "%",
              },

                name: "Significance Level α",
                min: 0.001,
                max: 0.1,
                step: 0.001,
                default: 0.05,
                unit: "",

            ],
            gauges: [
              {
                name: "KS Test p-value",
                decimals: 4,
                unit: "",
                // KS statistic ≈ drift/100, p-value shrinks with √N — simplified model
                compute: (v) => {
                  const n = v["Sample Size"];
                  const drift = v["True Drift Magnitude %"] / 100;
                  const stat = drift + 0.02;
                  // Kolmogorov distribution approximation: p ≈ 2*exp(-2*n*stat^2)
                  const p = Math.min(1, 2 * Math.exp(-2 * n * stat * stat));
                  return Math.max(0.0001, p);
                },
                good: [0.01, 0.05],
              },
              {
                name: "PSI Score",
                decimals: 3,
                unit: "",
                compute: (v) => {
                  const drift = v["True Drift Magnitude %"] / 100;
                  // PSI ≈ proportional to squared drift magnitude, scaled
                  return Math.min(1.5, drift * drift * 8 + 0.01);
                },
                good: [0.1, 0.25],
              },

                name: "False Positive Rate %",
                decimals: 1,
                unit: "%",
                compute: (v) => {
                  const n = v["Sample Size"];
                  const alpha = v["Significance Level α"];
                  // FPR explodes at large N because noise becomes "significant"
                  const noiseFactor = Math.min(5, Math.log10(n / 1000) * 0.8);
                  return Math.min(30, alpha * 100 * (1 + noiseFactor));
                },
                good: [0, 5],
              },
              {
                name: "Wasserstein Distance",
                decimals: 3,
                unit: "",
                compute: (v) => {
                  const drift = v["True Drift Magnitude %"] / 100;
                  // Wasserstein is stable across N — pure drift magnitude proxy
                  return Math.min(1.0, drift * 0.9 + 0.01);
                },
                good: [0.05, 0.15],
              },
            ],
